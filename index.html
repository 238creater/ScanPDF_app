<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Scan to PDF</title>
    <link rel="stylesheet" href="styles.css?v=20260629-7" />
  </head>
  <body>
    <main class="app">
      <section class="home screen" id="homeScreen">
        <header class="homeHeader">
          <div>
            <h1>Scan to PDF</h1>
            <p id="homeStatus">紙を撮ってPDFにできます。</p>
          </div>
        </header>

        <section class="homeSection">
          <div class="sectionHeader">
            <h2>履歴</h2>
          </div>
          <ol id="historyList" class="historyList"></ol>
          <p id="emptyHistory" class="emptyText">まだ履歴はありません。</p>
        </section>

        <div class="homeDock">
          <button id="newScanBtn" class="primaryDock" type="button">撮影開始</button>
          <label class="dockButton">
            インポート
            <input id="homeFileInput" type="file" accept="image/*" multiple />
          </label>
        </div>
      </section>

      <section class="captureScreen screen" id="captureScreen" hidden>
        <video id="camera" playsinline muted></video>
        <svg id="liveOverlay" class="liveOverlay" preserveAspectRatio="xMidYMid slice" aria-hidden="true"></svg>
        <div class="cameraFallback" id="cameraFallback" hidden>
          <strong>カメラを開始できません</strong>
          <span>ブラウザのカメラ許可を確認してください。</span>
        </div>
        <div class="captureTop">
          <button id="closeCaptureBtn" class="roundButton" type="button">×</button>
          <select id="flashSelect" class="flashSelect">
            <option value="off">フラッシュ オフ</option>
            <option value="auto">フラッシュ 自動</option>
            <option value="on">フラッシュ オン</option>
          </select>
        </div>
        <div class="captureBottom">
          <select id="captureModeSelect" class="modeSelect">
            <option value="document">ドキュメント</option>
            <option value="whiteboard">ホワイトボード</option>
            <option value="receipt">名刺</option>
            <option value="photo">写真</option>
          </select>
          <button id="captureBtn" class="shutterButton" type="button" disabled aria-label="撮影"></button>
          <button id="reviewFromCaptureBtn" class="reviewBubble" type="button" disabled>
            <span id="captureCount">0</span>
          </button>
        </div>
      </section>

      <section class="editScreen screen" id="editScreen" hidden>
        <button id="cancelEditBtn" class="backChevron" type="button" aria-label="戻る">‹</button>
        <div class="canvasWrap" id="canvasWrap">
          <canvas id="editCanvas"></canvas>
          <svg id="editOverlay" class="editOverlay" aria-hidden="true"></svg>
          <div class="editSideTools">
            <button id="rotateEditBtn" type="button">回転</button>
            <button id="retakeEditBtn" type="button">撮り直し</button>
            <button id="autoDetectBtn" type="button">再設定</button>
          </div>
        </div>
        <div class="editTray">
          <div class="editThumbRow">
            <button id="viewModeBtn" class="editThumb active" type="button">切取</button>
            <label class="editThumb addThumb">
              ＋
              <input id="editFileInput" type="file" accept="image/*" multiple />
            </label>
          </div>
          <div class="editTools">
          <label>
            仕上げ
            <select id="filterSelect">
              <option value="document">文書</option>
              <option value="whiteboard">ホワイトボード</option>
              <option value="receipt">領収書</option>
              <option value="photo">写真</option>
              <option value="ink">インク</option>
              <option value="gray">グレー</option>
              <option value="bw">白黒</option>
            </select>
          </label>
          <label>
            明るさ
            <input id="brightnessRange" type="range" min="-40" max="55" value="0" step="1" />
          </label>
          <label>
            くっきり
            <input id="contrastRange" type="range" min="0" max="55" value="8" step="1" />
          </label>
          </div>
          <div class="editActions">
            <button id="addAndShootBtn" type="button">さらに追加</button>
            <button id="addAndReviewBtn" class="primaryAction" type="button">レビューと編集 ›</button>
          </div>
        </div>
      </section>

      <section class="reviewScreen screen" id="reviewScreen" hidden>
        <header class="workHeader">
          <button id="backToHomeBtn" class="backChevron" type="button" aria-label="閉じる">‹</button>
          <div>
            <h1>レビューと編集</h1>
            <p id="reviewStatus">PDFに追加するページを確認できます。</p>
          </div>
          <button id="shareBtn" class="primarySmall" type="button" disabled>共有</button>
        </header>
        <ol id="pageList" class="pageList"></ol>
        <ol id="thumbList" class="thumbList"></ol>
        <div class="reviewDock">
          <label>
            用紙
            <select id="paperSelect">
              <option value="a4">A4</option>
              <option value="letter">Letter</option>
              <option value="image">画像サイズ</option>
            </select>
          </label>
          <button id="backToCaptureBtn" type="button">さらに追加</button>
          <label class="fileButton">
            追加
            <input id="fileInput" type="file" accept="image/*" multiple />
          </label>
          <button id="downloadBtn" class="primaryAction" type="button" disabled>完了</button>
          <button id="jpegBtn" type="button" disabled>JPEG</button>
        </div>
      </section>
    </main>

    <script src="app.js?v=20260629-7"></script>
  </body>
</html>
